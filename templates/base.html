<!doctype html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Transport & Umzugshilfe Alex{% endblock %}</title>
  <meta name="description" content="{{ _('Транспорт, помощь при переездах и логистика в Бремене и по всей Германии. Быстро, безопасно, надёжно.') }}"/>
  <meta name="theme-color" content="#0ea5a2"/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 -5 36 36'%3E%3Ctext y='24' font-size='24'%3E%F0%9F%9A%9A%3C/text%3E%3C/svg%3E">
  <link rel="preload" href="{{ url_for('static', filename='css/style.css') }}" as="style"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='leaflet/leaflet.css') }}">

</head>
<body>
<header class="header">
  <div class="container nav">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="logo">
  <img src="{{ url_for('static', filename='img/logo.PNG') }}" alt="Transport & Umzugshilfe Alex" width="42" height="42" loading="eager" decoding="async">
</span>

      <strong>Transport & Umzugshilfe Alex</strong>
    </a>

    <!-- Бургер-кнопка (мобайл) -->
    <button class="hamb" id="menuToggle" aria-label="Меню" aria-expanded="false" aria-controls="mainmenu">
      <span></span><span></span><span></span>
    </button>

    <!-- Только навигация -->
    <nav class="menu" id="mainmenu" aria-label="main">
      <a href="#leistungen">{{ _('Услуги') }}</a>
      <a href="#vorteile">{{ _('Преимущества') }}</a>
      <a href="#ablauf">{{ _('Как работаем') }}</a>
      <a href="#preise">{{ _('Цены') }}</a>
      <a href="#kontakt">{{ _('Контакты') }}</a>
    </nav>

    <!-- Переключатель темы (виден всегда) -->
    <div class="tools">
      <button class="theme" id="themeToggle" aria-label="Theme">🌙</button>
    </div>
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer container">
  <div>© {{ year if year is defined else now().year }} Transport & Umzugshilfe Alex ·
    <a href="{{ url_for('impressum') }}">Impressum</a> ·
    <a href="{{ url_for('privacy') }}">Datenschutz</a>
  </div>
  <!-- Смена языка во футере -->
  <div class="langs">
    <span class="muted">{{ _('Язык') }}:</span>
    <a href="{{ url_for('set_lang', lang='de') }}">DE</a>
    <a href="{{ url_for('set_lang', lang='ru') }}">RU</a>
    <a href="{{ url_for('set_lang', lang='en') }}">EN</a>
  </div>
</footer>
<script src="{{ url_for('static', filename='leaflet/leaflet.js') }}" defer></script>

<script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
